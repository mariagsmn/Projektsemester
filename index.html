<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Übersicht</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f2f2f2;
    gap: 40px;
  }
  .logo {
    max-width: 220px;
    height: auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 160px);
    grid-template-rows: repeat(2, 160px);
    gap: 24px;
  }
  .square {
    width: 160px;
    height: 160px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px;
    box-sizing: border-box;
    cursor: pointer;
    border: none;
    text-decoration: none;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 1.1rem;
    color: #fff;
    transition: transform 0.15s ease;
  }
  .square:hover {
    transform: scale(1.05);
  }
  .s1 { background: #e63946; }
  .s2 { background: #f4a261; }
  .s3 { background: #2a9d8f; }
  .s4 { background: #457b9d; }
  .s5 { background: #8338ec; }
  .s6 { background: #ffbe0b; }
</style>
</head>
<body>
  <div class="grid">
    <a class="square s1" href="bilder.html">Bilder</a>
    <a class="square s2" href="videos.html">Videos</a>
    <a class="square s3" href="podcast.html">Podcast</a>
    <a class="square s4" href="interviews.html">Interviews</a>
    <a class="square s5" href="wpmwpv.html">WPMs/WPVs</a>
    <a class="square s6" href="fuwa.html">Was geht in Fuwa?</a>
  </div>
  <img class="logo" src="logo.png" alt="We.Are.SoDaM!">
</body>
</html>
