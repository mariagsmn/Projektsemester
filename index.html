<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Farbige Quadrate</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f2f2f2;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(2, 120px);
    gap: 24px;
  }
  .square {
    width: 120px;
    height: 120px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .s1 { background: #e63946; }
  .s2 { background: #f4a261; }
  .s3 { background: #2a9d8f; }
  .s4 { background: #457b9d; }
  .s5 { background: #8338ec; }
  .s6 { background: #ffbe0b; }
</style>
</head>
<body>
  <div class="grid">
    <div class="square s1"></div>
    <div class="square s2"></div>
    <div class="square s3"></div>
    <div class="square s4"></div>
    <div class="square s5"></div>
    <div class="square s6"></div>
  </div>
</body>
</html>
